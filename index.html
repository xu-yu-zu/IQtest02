<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeIQ - 神经网络智能评估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .matrix-cell { background: rgba(255,255,255,0.05); border-radius: 12px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .option-btn { cursor: pointer; transition: all 0.3s; border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; background: rgba(255,255,255,0.03); }
        .option-btn:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); transform: translateY(-4px); }
        .option-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        /* 进度条动画 */
        @keyframes progress { from { width: 0%; } to { width: 100%; } }
        .animate-progress { animation: progress 2s linear forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 测试容器 -->
    <div id="test-container" class="max-w-4xl w-full">
        <!-- 进度 -->
        <div class="flex justify-between items-center mb-6">
            <span class="text-blue-400 font-bold uppercase tracking-widest text-sm">Question <span id="q-num">1</span> / 3</span>
            <div class="w-48 h-1.5 bg-slate-800 rounded-full">
                <div id="top-progress" class="h-full bg-blue-500 rounded-full transition-all duration-500" style="width: 33%"></div>
            </div>
        </div>

        <div class="glass-card p-6 md:p-10">
            <div class="grid md:grid-cols-2 gap-12">
                <!-- 左侧：题目矩阵 -->
                <div>
                    <h2 class="text-xl font-bold mb-6 text-slate-200">请识别图形中的隐藏逻辑：</h2>
                    <div id="matrix-grid" class="grid grid-cols-3 gap-3">
                        <!-- JS 填充 -->
                    </div>
                </div>

                <!-- 右侧：备选项 -->
                <div>
                    <h2 class="text-xl font-bold mb-6 text-slate-200">选择正确项：</h2>
                    <div id="options-grid" class="grid grid-cols-2 gap-4">
                        <!-- JS 填充 -->
                    </div>
                    <button onclick="handleNext()" class="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                        确认并继续
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 唬人的分析过渡页 (默认隐藏) -->
    <div id="analysis-screen" class="hidden fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-8"></div>
        <h2 class="text-3xl font-extrabold mb-4 bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">正在构建您的智力画像...</h2>
        <p id="analysis-text" class="text-slate-400 font-mono text-sm max-w-md h-12">正在同步全球常模数据库...</p>
        <div class="w-full max-w-md bg-slate-800 h-1.5 mt-8 rounded-full overflow-hidden">
            <div id="load-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- 结果页 (默认隐藏) -->
    <div id="result-screen" class="hidden max-w-2xl w-full text-center">
        <div class="glass-card p-12">
            <div class="inline-block p-4 rounded-full bg-blue-500/10 mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-4xl font-black mb-2">测试完成!</h1>
            <p class="text-slate-400 mb-8">您的流体智力水平评估如下</p>
            
            <div class="text-7xl font-black text-blue-500 mb-8">IQ 128</div>
            
            <div class="grid grid-cols-3 gap-4 mb-10">
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <div class="text-xs text-slate-500 uppercase mb-1">逻辑推理</div>
                    <div class="font-bold text-green-400">卓越 (P95)</div>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <div class="text-xs text-slate-500 uppercase mb-1">空间认知</div>
                    <div class="font-bold text-blue-400">优秀 (P88)</div>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <div class="text-xs text-slate-500 uppercase mb-1">模式识别</div>
                    <div class="font-bold text-purple-400">高级 (P92)</div>
                </div>
            </div>

            <button onclick="location.reload()" class="bg-white text-slate-950 font-bold px-8 py-3 rounded-full hover:bg-blue-50 transition-colors">
                重新测试
            </button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        let selectedIdx = null;

        // 题库设计（3道不同逻辑）
        const questions = [
            {
                // 逻辑：每一行形状相同，每一列颜色变深
                type: 'matrix',
                render: (r, c) => {
                    const colors = ['#334155', '#475569', '#94a3b8'];
                    const shapes = ['rect', 'circle', 'circle']; // 第3行第3个应为circle
                    if (r === 2 && c === 2) return '?';
                    let shapeHtml = r === 0 
                        ? `<rect width="30" height="30" x="15" y="15" fill="${colors[c]}" />`
                        : `<circle cx="30" cy="30" r="15" fill="${colors[c]}" />`;
                    return `<svg viewBox="0 0 60 60" width="40">${shapeHtml}</svg>`;
                },
                options: [
                    { html: `<svg viewBox="0 0 60 60" width="40"><circle cx="30" cy="30" r="15" fill="#94a3b8" /></svg>`, correct: true },
                    { html: `<svg viewBox="0 0 60 60" width="40"><rect width="30" height="30" x="15" y="15" fill="#334155" /></svg>`, correct: false },
                    { html: `<svg viewBox="0 0 60 60" width="40"><circle cx="30" cy="30" r="15" fill="#334155" /></svg>`, correct: false },
                    { html: `<svg viewBox="0 0 60 60" width="40"><rect width="30" height="30" x="15" y="15" fill="#94a3b8" /></svg>`, correct: false }
                ]
            },
            {
                // 逻辑：旋转规律。图形每列旋转 45 度
                type: 'matrix',
                render: (r, c) => {
                    if (r === 2 && c === 2) return '?';
                    const angle = (r * 3 + c) * 45;
                    return `<svg viewBox="0 0 60 60" width="40" style="transform: rotate(${angle}deg)"><rect width="30" height="6" x="15" y="27" fill="#3b82f6" rx="3"/></svg>`;
                },
                options: [
                    { html: `<svg viewBox="0 0 60 60" width="40" style="transform: rotate(0deg)"><rect width="30" height="6" x="15" y="27" fill="#3b82f6" rx="3"/></svg>`, correct: false },
                    { html: `<svg viewBox="0 0 60 60" width="40" style="transform: rotate(45deg)"><rect width="30" height="6" x="15" y="27" fill="#3b82f6" rx="3"/></svg>`, correct: false },
                    { html: `<svg viewBox="0 0 60 60" width="40" style="transform: rotate(360deg)"><rect width="30" height="6" x="15" y="27" fill="#3b82f6" rx="3"/></svg>`, correct: true },
                    { html: `<svg viewBox="0 0 60 60" width="40" style="transform: rotate(90deg)"><rect width="30" height="6" x="15" y="27" fill="#3b82f6" rx="3"/></svg>`, correct: false }
                ]
            },
            {
                // 逻辑：数量叠加。第一列+第二列=第三列
                type: 'matrix',
                render: (r, c) => {
                    if (r === 2 && c === 2) return '?';
                    const count = c === 0 ? 1 : (c === 1 ? 2 : 3);
                    let dots = '';
                    for(let i=0; i<count; i++) dots += `<circle cx="${15+i*15}" cy="30" r="5" fill="#f43f5e" />`;
                    return `<svg viewBox="0 0 60 60" width="50">${dots}</svg>`;
                },
                options: [
                    { html: `<svg viewBox="0 0 60 60" width="50"><circle cx="15" cy="30" r="5" fill="#f43f5e" /></svg>`, correct: false },
                    { html: `<svg viewBox="0 0 60 60" width="50"><circle cx="15" cy="30" r="5" fill="#f43f5e" /><circle cx="30" cy="30" r="5" fill="#f43f5e" /><circle cx="45" cy="30" r="5" fill="#f43f5e" /></svg>`, correct: true },
                    { html: `<svg viewBox="0 0 60 60" width="50"><circle cx="15" cy="30" r="5" fill="#f43f5e" /><circle cx="30" cy="30" r="5" fill="#f43f5e" /></svg>`, correct: false },
                    { html: `<svg viewBox="0 0 60 60" width="50"></svg>`, correct: false }
                ]
            }
        ];

        function initStep() {
            const q = questions[currentStep];
            selectedIdx = null;
            document.getElementById('q-num').innerText = currentStep + 1;
            document.getElementById('top-progress').style.width = ((currentStep + 1) / 3 * 100) + '%';
            
            // 渲染矩阵
            const matrixGrid = document.getElementById('matrix-grid');
            matrixGrid.innerHTML = '';
            for(let r=0; r<3; r++) {
                for(let c=0; c<3; c++) {
                    const div = document.createElement('div');
                    div.className = 'matrix-cell';
                    div.innerHTML = q.render(r, c);
                    if (div.innerText === '?') div.classList.add('text-blue-500', 'font-bold', 'text-2xl');
                    matrixGrid.appendChild(div);
                }
            }

            // 渲染选项
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerHTML = opt.html;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedIdx = idx;
                };
                optionsGrid.appendChild(btn);
            });
        }

        function handleNext() {
            if (selectedIdx === null) return alert("请选择一个答案");
            
            if (currentStep < questions.length - 1) {
                currentStep++;
                initStep();
            } else {
                startAnalysis();
            }
        }

        function startAnalysis() {
            document.getElementById('test-container').classList.add('hidden');
            document.getElementById('analysis-screen').classList.remove('hidden');
            
            const logs = [
                "正在校准神经元映射速度...",
                "对比全球 1,420,000+ 样本数据...",
                "检测认知偏离度...",
                "正在生成最终流体智力评估报告..."
            ];
            
            let i = 0;
            const bar = document.getElementById('load-bar');
            const text = document.getElementById('analysis-text');
            
            const interval = setInterval(() => {
                bar.style.width = (i + 1) * 25 + '%';
                text.innerText = logs[i];
                i++;
                if (i >= logs.length) {
                    clearInterval(interval);
                    setTimeout(showResult, 800);
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById('analysis-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
        }

        initStep();
    </script>
</body>
</html>
